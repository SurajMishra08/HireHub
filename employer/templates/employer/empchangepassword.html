{% extends 'employer/employerbase.html' %}
{% load static %}
{% block employer %}
<h1 class="text-center my-4">Change Password</h1>
<div class="row">
    <div class="col-sm-6 mx-auto p-5 shadow">
        <form action="" method="post">
            {% csrf_token %}
            <label for="oldpwd" class="mb-2">Old Password</label>
            <input type="password" name="oldpwd" id="oldpwd" class="form-control mb-4">
            <label for="newpwd" class="mb-2">New Password</label>
            <input type="password" name="newpwd" id="newpwd" class="form-control mb-4">
            <label for="confirmpwd" class="mb-2">Confirm Password</label>
            <input type="password" name="confirmpwd" id="confirmpwd" class="form-control mb-4">
            <button type="submit" class="btn-primary rounded-pill py-2 w-100 btn">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}

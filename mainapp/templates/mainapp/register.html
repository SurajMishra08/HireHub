{% extends 'mainapp/base.html' %}
{% load static %}
{% block maintitle %}
Hire Hub - Find Best Jobs
{% endblock %}

{% block main %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #0d1b2a, #1b263b);">
    <div class="card shadow-lg p-5 w-75 animate-card" style="border-radius: 15px; border: 2px solid #1b263b;">
        <h1 class="text-center text-primary fw-bold mb-4">Create Your Account</h1>
        
        {% if messages %}
        {% for m in messages %}
        <div class="alert alert-danger alert-dismissible fade show shadow-sm animate-alert">
            {{m}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        
        <form action="" method="post" class="mt-3">
            {% csrf_token %}
            <div class="mb-4">
                <label for="type" class="form-label fw-bold"><i class="fa-solid fa-clipboard-user me-2"></i>Account Type</label>
                <select name="usertype" id="opt" class="form-select shadow-sm border-effect">
                    <option value="">-- Select Account Type --</option>
                    <option value="jobseeker">Job Seeker</option>
                    <option value="employer">Employer</option>
                </select>
            </div>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <label for="firstname" class="form-label fw-bold"><i class="fa-solid fa-user me-2"></i>First Name*</label>
                    <input type="text" name="firstname" id="firstname" class="form-control shadow-sm border-effect">
                </div>
                <div class="col-md-6 mb-4">
                    <label for="lastname" class="form-label fw-bold"><i class="fa-solid fa-user me-2"></i>Last Name*</label>
                    <input type="text" name="lastname" id="lastname" class="form-control shadow-sm border-effect">
                </div>
            </div>
            <div class="mb-4">
                <label for="email" class="form-label fw-bold"><i class="fa-solid fa-envelope me-2"></i>Email*</label>
                <input type="email" name="email" id="email" class="form-control shadow-sm border-effect">
            </div>
            
            <div class="mb-4">
                <label for="contact" class="form-label fw-bold"><i class="fa-solid fa-phone me-2"></i>Contact No.</label>
                <input type="number" name="contact_no" id="contact" class="form-control shadow-sm border-effect">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-bold"><i class="fa-solid fa-lock me-2"></i>Password*</label>
                <input type="password" name="password" id="password" class="form-control shadow-sm border-effect">
            </div>
    
            <div class="mb-4">
                <label for="confirmpassword" class="form-label fw-bold"><i class="fa-solid fa-lock me-2"></i>Confirm Password*</label>
                <input type="password" name="confirmpassword" id="confirmpassword" class="form-control shadow-sm border-effect">
            </div>
            
            <!-- Terms -->
            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="terms">
                <label class="form-check-label" for="terms">By hitting the register button, you agree to the <a href="#">terms and conditions</a>.</label>
            </div>
            
            <!-- Submit -->
            <div class="text-center">
                <button class="btn btn-primary w-50 fw-bold py-2 shadow-sm btn-animate">Register</button>
            </div>
        </form>
    </div>
</div>

<style>
.animate-card {
    animation: fadeInUp 1s ease-in-out;
}
.animate-alert {
    animation: slideDown 0.8s ease-in-out;
}
.border-effect:focus {
    border: 2px solid #0077b6;
    box-shadow: 0 0 10px rgba(0, 119, 182, 0.5);
    transition: all 0.3s ease;
}
.btn-animate:hover {
    transform: scale(1.05);
    background: linear-gradient(90deg, #0077b6, #00b4d8);
    color: #fff;
    transition: all 0.3s ease;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}

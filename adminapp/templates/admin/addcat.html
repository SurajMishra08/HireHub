{% extends 'admin/adminbase.html' %}
{% load static %}
{% block admin %}
<style>
.card {
    border-radius: 12px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.card h3 {
    color: #0077b6;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
}
.form-control:focus {
    border-color: #0077b6;
    box-shadow: 0 0 8px rgba(0, 119, 182, 0.5);
}
.btn-success {
    border-radius: 25px;
    padding: 10px 25px;
    transition: all 0.3s ease;
}
.btn-success:hover {
    background: linear-gradient(90deg, #0077b6, #00b4d8);
    transform: scale(1.05);
    color: #fff;
}
</style>

<div class="col-sm-12">
    <div class="card shadow-lg p-4">
        <h3>Add New Job Category</h3>
        <form method="post" class="mt-3">
            {% csrf_token %}
            <div class="mb-3">
                <label for="catname" class="form-label fw-bold">Category Name</label>
                <input type="text" name="category_name" id="catname" class="form-control" placeholder="Enter category name">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary rounded-5">Add Category</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
